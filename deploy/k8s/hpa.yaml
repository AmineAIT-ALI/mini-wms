## ─── HPA for PHP-FPM app ─────────────────────────────────────────────────────
## Trigger: CPU > 50%
## Scale: 1 → 5 replicas
## Command: kubectl scale deployment mini-wms-app --replicas=3 -n mini-wms
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mini-wms-app-hpa
  namespace: mini-wms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mini-wms-app
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               AverageValue
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type:               AverageValue
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type:          Pods
          value:         2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type:          Pods
          value:         1
          periodSeconds: 120

# ─── Secret – Mini WMS ────────────────────────────────────────────────────────
# DO NOT commit real secrets to version control.
# Create this secret manually before applying the other manifests:
#
#   kubectl create secret generic mini-wms-secret \
#     -n mini-wms \
#     --from-literal=DB_PASS='<your-db-password>' \
#     --from-literal=APP_SECRET='<your-32-char-secret>'
#
# The values below are placeholders — replace before deploying.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mini-wms-secret
  namespace: mini-wms
type: Opaque
data:
  # echo -n "<your-db-password>" | base64
  DB_PASS:    CHANGE_ME_BASE64==
  # echo -n "<your-32-char-secret>" | base64
  APP_SECRET: CHANGE_ME_BASE64==
